# IdleX 业务上下文 — 供 Agent 消费的结构化业务知识

# ============================================================
# Part 1: 核心价值定义 (SBMP)
# ============================================================
coreValue:
  mission: "找闲置空间，问IdleX"
  model: "AI-Native 本地生活服务平台"
  description: |
    IdleX 通过 GEO（Generative Engine Optimization）策略，
    将线下闲置空间（自助KTV、共享办公、迷你健身房等）
    转化为AI可理解、可调用、可履约的数字资产。
    目标是让用户通过任何AI助手提问时，能得到准确、可预订的空间推荐。

# ============================================================
# Part 2: 当前阶段
# ============================================================
currentPhase:
  name: "MVP 长沙单城"
  scope: "长沙市自助KTV品类"
  targetStores: 5
  targetModels:
    - name: "豆包"
      provider: "字节跳动"
      ecosystem: "抖音"
    - name: "通义千问"
      provider: "阿里巴巴"
      ecosystem: "高德/支付宝"
    - name: "腾讯元宝"
      provider: "腾讯"
      ecosystem: "微信/搜一搜"
  successCriteria:
    - "5家门店全部完成GEO内容发布"
    - "至少1个模型能正确推荐IdleX门店"
    - "端到端流程（采集→发布→监测）跑通"

# ============================================================
# Part 3: 领域术语表
# ============================================================
glossary:
  GEO: "Generative Engine Optimization，生成式引擎优化。针对AI搜索引擎的内容优化策略，类似传统SEO但面向AI模型。"
  三公里流量圈: "以门店为圆心、3公里为半径的地理服务范围。用户搜索'附近KTV'时的核心命中区域。"
  一模一策: "针对不同AI模型（豆包/千问/元宝）制定差异化内容策略的原则。每个模型的训练数据、偏好、生态不同，需要定制化内容。"
  闲置空间: "非全时段使用的线下商业空间。如KTV白天时段、会议室周末时段、健身房凌晨时段。"
  可履约: "AI推荐的信息必须真实可用——用户看到价格能下单，看到时段能预订，看到位置能导航。"
  数字资产: "门店的结构化数据档案，包含基础信息、GEO内容、实时状态，使门店可被AI理解和调用。"
  门店档案: "Dossier，门店在BPS引擎中的版本化数据实体。每次数据更新创建新版本，支持历史追溯。"

# ============================================================
# Part 4: 结晶化评估记录
# ============================================================
crystallizationAssessment:
  process: "GEO门店运营"
  verdict: "适合结晶化"
  evaluation:
    - criterion: "是否高频重复？"
      answer: "是。每家门店都需要完整走一遍 GEO 流程，长沙5家，未来数百家。"
    - criterion: "输入/输出是否可形式化？"
      answer: "是。输入是门店基础数据，输出是结构化档案+GEO内容，schema明确。"
    - criterion: "是否有明确的完成标准？"
      answer: "是。每个阶段有可验证的产出物（核验分数、内容审核通过、发布成功、监测评分）。"
    - criterion: "是否能分解为原子步骤？"
      answer: "是。已分解为12个原子服务，每个服务职责单一。"
    - criterion: "异常路径是否可枚举？"
      answer: "基本可以。主要异常：数据核验不通过（打回重采）、内容审核不通过（退回修改）、发布失败（重试）。"
    - criterion: "Agent 能否胜任执行？"
      answer: "大部分可以。数据采集、内容生成、发布均可Agent执行，仅内容审核需人工。"
    - criterion: "人工干预点是否明确？"
      answer: "是。唯一的人工节点是svc-content-review（内容质量审核）。"
