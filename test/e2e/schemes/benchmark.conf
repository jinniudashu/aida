# AIDA Evaluation Scheme: Multi-Model Benchmark
# Runs IdleX GEO E2E v3 across 6 models
# Duration: ~2-3 hours

name=benchmark
description="Multi-model benchmark (6 models × IdleX GEO)"

# Delegates to benchmark runner
script=benchmark/run-all-models.sh
log_dir=benchmark/results

# Scoring rubric (per-model scoring applied post-hoc)
rubric=structural.json

# Model configuration (managed by benchmark/config.json)
model_env=BENCHMARK_MODEL
model_default=all
