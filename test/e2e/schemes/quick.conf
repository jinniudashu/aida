# AIDA Evaluation Scheme: Quick Engine-Only
# D1-D11 structural checks, no Agent turns (~3 seconds)
# Use for rapid regression checks after engine code changes

name=quick
description="Engine-only structural checks (no Agent turns)"

# Delegates to structural-capability.sh with --engine-only
script=structural-capability.sh
log_dir=/tmp/structural-capability
extra_args=--engine-only

# Scoring rubric (same as structural, engine-only metrics will be limited)
rubric=structural.json

# Model configuration (not used in engine-only mode)
model_env=SC_MODEL
model_default=dashscope/qwen3.5-plus
